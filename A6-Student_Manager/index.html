<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 30px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            color: #764ba2;
            margin-top: 20px;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-right: 10px;
            margin-top: 20px;
        }

        button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Student Manager</h1>
    <p>Check the browser console to see student analysis and average marks.</p>
    <p><strong>Open Console:</strong> Right-click → Inspect → Console tab</p>
    
    <button onclick="analyzeStudents()">Analyze Students</button>
    <button onclick="clearConsole()">Clear Console</button>
</div>

<script src="script.js"></script>

</body>
</html>
