<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - MVC API</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <header>
      <h1>📝 Task Manager</h1>
      <p class="subtitle">Manage your tasks with our MVC API</p>
    </header>

    <!-- ADD TASK FORM -->
    <div class="form-section">
      <h2>➕ Add New Task</h2>
      <form id="taskForm">
        <!-- Task Title Input -->
        <div class="form-group">
          <label for="title">Task Title *</label>
          <input 
            type="text" 
            id="title" 
            placeholder="e.g., Buy groceries"
            required
          >
        </div>
        
        <!-- Task Description Input -->
        <div class="form-group">
          <label for="description">Description</label>
          <textarea 
            id="description" 
            placeholder="e.g., Milk, eggs, bread (optional)"
            rows="3"
          ></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary">Add Task</button>
      </form>
    </div>

    <!-- TASK LIST -->
    <div class="tasks-section">
      <h2>📋 Tasks (<span id="taskCount">0</span>)</h2>
      <div id="taskList" class="task-list">
        <p class="no-tasks">No tasks yet. Create your first task!</p>
      </div>
    </div>
  </div>

  <!-- Link to JavaScript -->
  <script src="script.js"></script>
</body>
</html>
