<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management System - CRUD Lab</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 Library Management</h1>
      <p>A full-stack CRUD application using Node.js, Express, and Mongoose.</p>
    </header>

    <main>
      <!-- Form to Add/Edit Book -->
      <section class="glass-card form-section">
        <h2 id="form-title">Add New Book</h2>
        <form id="book-form">
          <input type="hidden" id="book-id">
          
          <div class="form-group">
            <label for="title">Book Title</label>
            <input type="text" id="title" placeholder="Enter book title" required>
          </div>
          
          <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" placeholder="Enter author name" required>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="year">Publication Year</label>
              <input type="number" id="year" placeholder="e.g. 2024" required>
            </div>
            
            <div class="form-group">
              <label for="genre">Genre</label>
              <input type="text" id="genre" placeholder="e.g. Fiction, Science" required>
            </div>
          </div>
          
          <div class="form-actions">
            <button type="submit" id="submit-btn" class="btn btn-primary">Add Book</button>
            <button type="button" id="cancel-btn" class="btn btn-secondary hidden">Cancel Edit</button>
          </div>
        </form>
      </section>

      <!-- List of Books -->
      <section class="glass-card list-section">
        <h2>Book Inventory</h2>
        <div id="loading" class="loading">Loading books...</div>
        <div id="books-container" class="books-grid">
          <!-- Book cards will be injected here by JS -->
        </div>
      </section>
    </main>
  </div>

  <!-- Custom Delete Confirmation Modal -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-icon">🗑️</div>
      <h3>Delete Book?</h3>
      <p>This action cannot be undone. The book will be permanently removed from the database.</p>
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="btn btn-secondary">Cancel</button>
        <button id="modal-confirm-btn" class="btn btn-danger">Yes, Delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
